  </symbol>

  <!-- Platform / institution -->
  <symbol id="icon-platform" viewBox="0 0 24 24">
    <rect x="2" y="3" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <rect x="13" y="3" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <rect x="2" y="14" width="9" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <rect x="13" y="14" width="9" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- Warning / alert -->
  <symbol id="icon-warning" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0v0z"/>
