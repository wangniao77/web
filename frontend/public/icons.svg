      d="M12 8v4M12 16h.01"/>
  </symbol>

  <!-- Psychological warning -->
  <symbol id="icon-warning-psych" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M12 2a10 10 0 1010 10A10 10 0 0012 2z"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M12 6v6l4 2"/>
  </symbol>

  <!-- Employment warning -->
  <symbol id="icon-warning-job" viewBox="0 0 24 24">
    <rect x="2" y="7" width="20" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
    <circle cx="12" cy="14" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- Funding warning -->
  <symbol id="icon-warning-funding" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="16" x2="12.01" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- QR code icon -->
  <symbol id="icon-qr" viewBox="0 0 24 24">
    <rect x="3" y="3" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <rect x="14" y="3" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <rect x="3" y="14" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <line x1="14" y1="14" x2="14" y2="14" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    <line x1="17" y1="17" x2="21" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="21" y1="17" x2="17" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Clock -->
  <symbol id="icon-clock" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <polyline points="12,6 12,12 16,14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Target / goal -->
  <symbol id="icon-target" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- Arrow up -->
  <symbol id="icon-arrow-up" viewBox="0 0 24 24">
    <polyline points="18,15 12,9 6,15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Arrow down -->
  <symbol id="icon-arrow-down" viewBox="0 0 24 24">
    <polyline points="6,9 12,15 18,9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
</svg>
