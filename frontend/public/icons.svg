  </symbol>

  <!-- Influence / broadcast -->
  <symbol id="icon-influence" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M2 12h2M6 8v8M10 5v14M14 9v6M18 7v10M22 12h-2"/>
  </symbol>

