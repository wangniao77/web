  <symbol id="icon-graduation" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M22 10.5l-10-5L2 10.5l10 5 10-5z"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M6 12.5v4l6 3 6-3v-4"/>
  </symbol>

