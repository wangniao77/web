<svg xmlns="http://www.w3.org/2000/svg">
  <!-- ================================================================ -->
  <!-- Tech Luminous — SVG Icon Sprite (stroke-based, currentColor)      -->
  <!-- ================================================================ -->

  <!-- Star / rating -->
  <symbol id="icon-star" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"
      d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
  </symbol>

  <!-- People / students -->
  <symbol id="icon-people" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
    <circle fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" cx="9" cy="7" r="4"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
  </symbol>

  <!-- Funding / money -->
  <symbol id="icon-funding" viewBox="0 0 24 24">
    <line x1="12" y1="1" x2="12" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M17 5H9.5A3.5 3.5 0 006 8.5v0A3.5 3.5 0 009.5 12H14.5a3.5 3.5 0 010 7H6"/>
  </symbol>

  <!-- Ranking / trophy -->
  <symbol id="icon-ranking" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M6 9H4a2 2 0 01-2-2V5a2 2 0 012-2h2v6z"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M18 9h2a2 2 0 002-2V5a2 2 0 00-2-2h-2v6z"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      d="M6 9h12v2a6 6 0 01-6 6v0a6 6 0 01-6-6V9z"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M12 17v4M8 21h8"/>
  </symbol>

  <!-- Satisfaction / heart -->
  <symbol id="icon-satisfaction" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
