    <rect x="4" y="2" width="16" height="20" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <line x1="9" y1="6" x2="9" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="6" x2="15" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="14" x2="9" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="14" x2="15" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="10" x2="20" y2="10" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

